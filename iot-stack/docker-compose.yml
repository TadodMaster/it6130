services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
    networks:
      - iot-net

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: iot-lab
      DOCKER_INFLUXDB_INIT_BUCKET: iot_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: iot-token-123
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - iot-net

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb
    networks:
      - iot-net

  sensor:
    build: ./sensor
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: iot/sensors
      DEVICE_ID: sensor-01
      PUBLISH_INTERVAL: 2
    depends_on:
      - mosquitto
    networks:
      - iot-net

  system-monitor:
    build: ./system_monitor
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: system/info
      DEVICE_ID: system-monitor-01
      PUBLISH_INTERVAL: 5
    depends_on:
      - mosquitto
    networks:
      - iot-net

  processor:
    build: ./processor
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: "#"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: iot-token-123
      INFLUXDB_ORG: iot-lab
      INFLUXDB_BUCKET: iot_data
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - iot-net

volumes:
  influxdb-data:
  grafana-data:

networks:
  iot-net:
    driver: bridge